<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="949" height="256" viewBox="0 0 949 256" preserveAspectRatio="xMidYMid meet" fill="none" role="img" aria-label="smalljerry logo">
  <defs>
    <linearGradient id="jerryGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c9cff"/>
      <stop offset="100%" stop-color="#ff9ab2"/>
    </linearGradient>
  </defs>

  <!-- 字标 <smalljerry/>，居中放大 -->
  <g font-family="'Quicksand','Nunito','PingFang SC','Helvetica Neue',Arial,sans-serif" font-weight="800">
    <!-- 左尖括号 -->
    <path d="M64 84 L30 124 L64 164" fill="none" stroke="#7c9cff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- small -->
    <text x="86" y="164" font-size="130" fill="#2d3142" letter-spacing="2">small</text>
    <!-- jerry（与 small 预留充足间距） -->
    <text x="494" y="164" font-size="130" fill="url(#jerryGrad)" letter-spacing="2">jerry</text>
    <!-- 右闭合标记 /&gt; -->
    <g fill="none" stroke="#7c9cff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <line x1="852" y1="164" x2="872" y2="84"/>
      <path d="M890 84 L920 124 L890 164"/>
    </g>
  </g>
</svg>
